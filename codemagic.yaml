workflows:
  ios-build:
    name: Cinema Audio Luxe iOS Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean Flutter
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks ios/Flutter/Flutter.framework
      - name: Install dependencies
        script: flutter pub get
      - name: Update CocoaPods repo
        script: pod repo update
      - name: Install CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          pod install --repo-update --verbose
          cd ..
      - name: Build iOS app (no signing)
        script: |
          flutter build ios --release --no-codesign --verbose
      - name: Package .ipa manually
        script: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r CinemaAudioLuxe.ipa Payload
          mkdir -p build/ios/ipa
          mv CinemaAudioLuxe.ipa build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - yenamdossou@outlook.fr
