workflows:
  ios-build:
    name: Cinema Audio Luxe iOS Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Deep clean
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
      - name: Install dependencies
        script: flutter pub get
      - name: Update CocoaPods repo
        script: pod repo update
      - name: Install CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          pod install --repo-update --verbose
          cd ..
      - name: Build iOS app (no signing)
        script: |
          flutter build ios --release --no-codesign --verbose
      - name: Package .ipa manually
        script: |
          set -e
          mkdir -p Payload
          APP_PATH=$(ls -d build/ios/iphoneos/*.app 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found in build/ios/iphoneos. Listing directory contents:"
            ls -la build/ios/iphoneos || true
            exit 1
          fi
          echo "Found app bundle: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r CinemaAudioLuxe.ipa Payload
          mkdir -p build/ios/ipa
          mv CinemaAudioLuxe.ipa build/ios/ipa/
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - yenamdossou@outlook.fr
